name: 航展监控

on:
  # 每30分钟检测一次（包括北京时间9点）
  schedule:
    - cron: '*/30 * * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v4
    
    - name: 恢复状态文件
      uses: actions/cache@v3
      id: state-cache
      with:
        path: airshow_state.json
        key: airshow-state-${{ github.repository_id }}
        restore-keys: |
          airshow-state-
    
    - name: 设置 Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: 安装依赖
      run: |
        pip install requests pytz
    
    - name: 运行监控脚本
      env:
        SERVERCHAN_KEY: ${{ secrets.SERVERCHAN_KEY }}
      run: python3 monitor.py
    
    - name: 保存状态文件
      uses: actions/cache@v3
      with:
        path: airshow_state.json
        key: airshow-state-${{ github.repository_id }}
